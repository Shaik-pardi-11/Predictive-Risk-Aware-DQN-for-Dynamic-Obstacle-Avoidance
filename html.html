<!DOCTYPE html>
<html>
<head>
    <title>RSVP Form</title>
    <link rel="stylesheet"
          href="\jquery.min.js">

    <script>
        function validate() {
            let f = document.forms["form"];
            if (f.fname.value === "" || f.lname.value === "" || f.email.value === "" ||
                f.phone.value === "" || f.country.value === "" || f.state.value === "" ||
                f.zip.value === "") {
                alert("Fill all fields");
                return false;
            }
            alert("RSVP Submitted Successfully");
        }
    </script>
</head>
<body class="bg-light">
    <div class="container mt-5 w-50">
        <h2 class="text-center">RSVP Form</h2>
        <form name="form" onsubmit="return validate()" class="border p-4 bg-white">
            <input type="text" class="form-control mb-3" placeholder="First Name" name="fname">
            <input type="text" class="form-control mb-3" placeholder="Last Name" name="lname">
            <input type="email" class="form-control mb-3" placeholder="Email" name="email">
            <input type="tel" class="form-control mb-3" placeholder="Phone Number" name="phone">
            <input type="text" class="form-control mb-3" placeholder="Country" name="country">
            <input type="text" class="form-control mb-3" placeholder="State" name="state">
            <input type="text" class="form-control mb-3" placeholder="ZIP" name="zip">
            <textarea class="form-control mb-3" placeholder="Other Information"></textarea>
            <div class="d-flex justify-content-between">
                <input type="submit" class="btn btn-primary" value="Submit">
                <input type="reset" class="btn btn-danger" value="Cancel">
            </div>
        </form>
    </div>
</body>
</html>
