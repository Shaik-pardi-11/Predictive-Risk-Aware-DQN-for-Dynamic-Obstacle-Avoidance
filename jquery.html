<html>
    <head>
        <title>Fade effects using query</title>
        <script src="\jquery.min.js"></script>
    </head>
    <script>
        $(document).ready(function(){
            $('#btn1').click(function(){
                $('#div1').fadeIn(2000);
                $('#div2').fadeIn(4000);
                $('#div3').fadeIn(6000);
            })
            $('#btn2').click(function(){
                $('#div1').fadeOut(2000);
                $('#div2').fadeOut(4000);
                $('#div3').fadeOut(6000);
            })
            $('#btn3').click(function(){
                $('#div1').fadeToggle(2000);
                $('#div2').fadeToggle(4000);
                $('#div3').fadeToggle(6000);
            })
        })
    </script>
    <body style="text-align: center;">
        <p>Fade with Different parameters.</p>
        <button id="btn1" >Fade In</button>
        <button id="btn2">Fade Out</button>
        <button id="btn3">Fade Toggle</button>
        <br><br>
        <div id="div1" style="width: 80px; height: 80px; background-color: red;">
        </div>
        <br>
        <div id="div2" style="width: 80px; height: 80px; background-color: aqua;">
        </div>
        <br>
        <div id="div3" style="width: 80px; height: 80px; background-color: blue;">
        </div>
    </body>
</html>
